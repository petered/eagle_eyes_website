<style>
    .download-frame-wrap {
        width: 100%;
        margin: 0 auto;
    }
    .download-frame {
        display: block;
        width: 100%;
        min-height: 80vh;
        border: 0;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }
    @media (max-width: 600px) {
        .download-frame { min-height: 75vh; border-radius: 8px; }
    }
</style>

<div class="download-frame-wrap">
    <iframe
        id="downloadFrame"
        class="download-frame"
        src="{{ '/download/?embedded=true' | relative_url }}"
        title="Download Eagle Eyes apps"
        loading="lazy"
        referrerpolicy="same-origin"></iframe>
</div>

<script>
    // Auto-grow the iframe so its inner page never has its own scrollbar; the
    // sidebar layout's main scroll area handles overflow instead.
    (function() {
        var frame = document.getElementById('downloadFrame');
        if (!frame) return;
        function resize() {
            try {
                var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
                if (!doc) return;
                var h = Math.max(
                    doc.body ? doc.body.scrollHeight : 0,
                    doc.documentElement ? doc.documentElement.scrollHeight : 0
                );
                if (h > 0) frame.style.height = h + 'px';
            } catch (e) { /* cross-origin shouldn't apply (same site), but be safe */ }
        }
        frame.addEventListener('load', function() {
            resize();
            // The wizard advances steps without reloading the iframe, so poll
            // for height changes for a while after load.
            var ticks = 0;
            var iv = setInterval(function() {
                resize();
                if (++ticks > 60) clearInterval(iv);
            }, 250);
        });
        window.addEventListener('resize', resize);
    })();
</script>
