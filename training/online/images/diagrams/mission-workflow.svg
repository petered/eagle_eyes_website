<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <filter id="boxShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Mission Execution Workflow</text>

  <!-- Step 1: Create -->
  <g transform="translate(20, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="130" height="90" rx="8" fill="#3498db"/>
    <circle cx="20" cy="20" r="14" fill="white"/>
    <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">1</text>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CREATE</text>
    <text x="65" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Draw polygon</text>
  </g>
  <line x1="150" y1="105" x2="175" y2="105" stroke="#3498db" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 2: Configure -->
  <g transform="translate(180, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="130" height="90" rx="8" fill="#9b59b6"/>
    <circle cx="20" cy="20" r="14" fill="white"/>
    <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#9b59b6">2</text>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">CONFIGURE</text>
    <text x="65" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Set parameters</text>
  </g>
  <line x1="310" y1="105" x2="335" y2="105" stroke="#3498db" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 3: Generate -->
  <g transform="translate(340, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="130" height="90" rx="8" fill="#27ae60"/>
    <circle cx="20" cy="20" r="14" fill="white"/>
    <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">3</text>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">GENERATE</text>
    <text x="65" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Create grid</text>
  </g>
  <line x1="470" y1="105" x2="495" y2="105" stroke="#3498db" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 4: Upload -->
  <g transform="translate(500, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="130" height="90" rx="8" fill="#e67e22"/>
    <circle cx="20" cy="20" r="14" fill="white"/>
    <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e67e22">4</text>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">UPLOAD</text>
    <text x="65" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Send to drone</text>
  </g>
  <line x1="630" y1="105" x2="655" y2="105" stroke="#3498db" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 5: Execute -->
  <g transform="translate(660, 60)" filter="url(#boxShadow)">
    <rect x="0" y="0" width="130" height="90" rx="8" fill="#e74c3c"/>
    <circle cx="20" cy="20" r="14" fill="white"/>
    <text x="20" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">5</text>
    <text x="65" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">EXECUTE</text>
    <text x="65" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">Fly mission</text>
  </g>

  <!-- Details row -->
  <g transform="translate(20, 180)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">📍 Select area</text>
    <text x="65" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">🖱️ Right-click</text>
    <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">📋 Flight Grid</text>
  </g>

  <g transform="translate(180, 180)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">🔺 Altitude</text>
    <text x="65" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">⚡ Speed</text>
    <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">📐 Overlap</text>
  </g>

  <g transform="translate(340, 180)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">🗺️ Preview</text>
    <text x="65" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">📊 Stats</text>
    <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✅ Confirm</text>
  </g>

  <g transform="translate(500, 180)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">📡 Connect</text>
    <text x="65" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">⬆️ Transfer</text>
    <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">✓ Ready</text>
  </g>

  <g transform="translate(660, 180)">
    <rect x="0" y="0" width="130" height="60" rx="6" fill="#ecf0f1" stroke="#bdc3c7"/>
    <text x="65" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">▶️ Start</text>
    <text x="65" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">⏸️ Pause/Resume</text>
    <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">🏁 Complete</text>
  </g>
</svg>
