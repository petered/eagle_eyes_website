<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200">
  <defs>
    <linearGradient id="offGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#95a5a6"/>
      <stop offset="100%" style="stop-color:#7f8c8d"/>
    </linearGradient>
    <linearGradient id="normalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db"/>
      <stop offset="100%" style="stop-color:#2980b9"/>
    </linearGradient>
    <linearGradient id="hyperGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="silentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
  </defs>

  <text x="330" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Detection Modes</text>

  <!-- OFF -->
  <g transform="translate(10, 50)">
    <rect x="0" y="0" width="150" height="130" rx="8" fill="url(#offGrad)"/>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">OFF</text>
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white">✖</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Detection disabled</text>
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">No processing</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Saves battery</text>
  </g>

  <!-- NORMAL -->
  <g transform="translate(175, 50)">
    <rect x="0" y="0" width="150" height="130" rx="8" fill="url(#normalGrad)"/>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">NORMAL</text>
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white">👁️</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Threshold filtering</text>
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Balanced results</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Default mode</text>
  </g>

  <!-- HYPERSENSITIVE -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="150" height="130" rx="8" fill="url(#hyperGrad)"/>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">HYPERSENSITIVE</text>
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white">👀</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">No threshold filtering</text>
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Shows all detections</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Max sensitivity</text>
  </g>

  <!-- SILENT -->
  <g transform="translate(505, 50)">
    <rect x="0" y="0" width="150" height="130" rx="8" fill="url(#silentGrad)"/>
    <text x="75" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">SILENT</text>
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="white">💾</text>
    <text x="75" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Logs only, no display</text>
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Background recording</text>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">Review later</text>
  </g>
</svg>
