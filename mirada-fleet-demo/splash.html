<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eagle Eyes Mirada</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 0 30px 0;
      overflow: hidden;
      user-select: none;
    }

    /* Top section: Logo and text */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 64px;
      height: 64px;
    }

    .title {
      font-size: 18px;
      font-weight: 500;
      color: #e0e0e0;
      letter-spacing: 0.5px;
    }

    .version {
      font-size: 12px;
      color: #888888;
      margin-top: -4px;
    }

    /* Middle section: Panning image */
    .pan-container {
      width: 100%;
      height: 180px;
      overflow: hidden;
      position: relative;
    }

    .pan-image {
      height: 100%;
      width: auto;
      min-width: 200%;
      object-fit: cover;
      animation: pan 12s ease-in-out infinite alternate;
    }

    @keyframes pan {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(calc(-100% + 500px));
      }
    }

    /* Loading bar section */
    .loading-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loading-bar-container {
      width: 300px;
      height: 4px;
      background-color: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(433%);
      }
    }

    /* Bottom section: Note */
    .footer {
      font-size: 11px;
      color: #666666;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="splash-logo.png" alt="Mirada Logo" class="logo">
    <div class="title">Opening Eagle Eyes Mirada</div>
    <div class="version" id="version">Version</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const version = params.get('v') || '0.0.0';
    document.getElementById('version').textContent = 'Version ' + version;
  </script>

  <div class="pan-container">
    <img src="splash-bg.jpg" alt="" class="pan-image">
  </div>

  <div class="loading-section">
    <div class="loading-bar-container">
      <div class="loading-bar"></div>
    </div>
  </div>

  <div class="footer">May take several minutes on first start</div>
</body>
</html>
