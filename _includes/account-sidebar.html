<!--
  Sidebar shown on signed-in account-area pages.
  - Static items at the top: Profile, Downloads, Support.
  - At the bottom: an Account settings group with one section per organization
    (and a Personal Account section when applicable). Populated by JS in the
    layout once orgs/licenses load. Cached in sessionStorage so subsequent
    navigations within a session render it instantly.
  - {{ page.active }} drives highlighting of static items; the org sub-items
    are highlighted from JS by parsing window.location.hash.
-->
<aside class="account-sidebar" id="accountSidebar" aria-label="Account navigation">
    <button type="button" class="account-sidebar-close" id="accountSidebarClose" aria-label="Close menu">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M6 6 L18 18 M6 18 L18 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"></path>
        </svg>
    </button>
    <nav>
        <ul class="account-sidebar-nav">
            <li>
                <a href="{{ '/account/profile/' | relative_url }}"
                   class="account-sidebar-link{% if page.active == 'profile' %} active{% endif %}">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"></circle>
                        <path d="M4 21c0-4 4-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"></path>
                    </svg>
                    <span>Profile</span>
                </a>
            </li>
            <li>
                <a href="{{ '/account/downloads/' | relative_url }}"
                   class="account-sidebar-link{% if page.active == 'downloads' %} active{% endif %}">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M12 4v12m0 0l-4-4m4 4l4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                        <path d="M4 19h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                    </svg>
                    <span>Downloads</span>
                </a>
            </li>
            <li>
                <a href="{{ '/account/support/' | relative_url }}"
                   class="account-sidebar-link{% if page.active == 'support' %} active{% endif %}">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"></circle>
                        <path d="M9.5 9.5a2.5 2.5 0 1 1 3.5 2.3c-.7.3-1 .9-1 1.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                        <circle cx="12" cy="17" r="1" fill="currentColor"></circle>
                    </svg>
                    <span>Support</span>
                </a>
            </li>

            <!-- Account settings: collapsible group. Header + per-org
                 sections live inside a single group <li>; clicking the
                 header toggles a class on the wrapper that reveals/hides
                 the org list and applies a unified light-blue background.
                 Hidden until the user is signed in. -->
            <li id="sidebarAccountGroup" class="account-sidebar-group" style="display: none;">
                <button type="button" id="sidebarAccountHeader" class="account-sidebar-link account-sidebar-group-toggle" aria-expanded="false" aria-controls="sidebarOrgAnchor">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2"></path>
                    </svg>
                    <span class="account-sidebar-group-label">Account settings</span>
                    <svg class="account-sidebar-chevron" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                        <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
                    </svg>
                </button>
                <div id="sidebarOrgAnchor" class="account-sidebar-orgs"></div>
            </li>
        </ul>
    </nav>
</aside>
