    <script>
        // Site admins authorized to use the "Log in as" tool. Treated as a UX
        // gate only — the backend cloud function (admin_impersonate_user) must
        // independently verify the caller against its own allowlist before
        // minting a custom token.
        var SITE_ADMIN_EMAILS = [
            'joep@eagleeyessearch.com',
            'peter@eagleeyessearch.com',
            'patrick@eagleeyessearch.com'
        ];

        (function() {
            function applyAuthState(user) {
                var getBtn = document.getElementById('navGetEagleEyesBtn');
                var profile = document.getElementById('navProfileMenu');
                var emailEl = document.getElementById('navProfileEmail');
                var adminEl = document.getElementById('navAdminImpersonate');
                if (!profile) return;
                if (user) {
                    if (getBtn) getBtn.style.display = 'none';
                    profile.style.display = '';
                    if (emailEl) emailEl.textContent = user.email || '';
                    if (adminEl) {
                        var email = (user.email || '').toLowerCase();
                        adminEl.style.display = SITE_ADMIN_EMAILS.indexOf(email) !== -1 ? '' : 'none';
                    }
                } else {
                    if (getBtn) getBtn.style.display = '';
                    profile.style.display = 'none';
                    if (adminEl) adminEl.style.display = 'none';
                    closeProfileDropdown();
                }
            }

            // Form submit handler — exposed on window so onsubmit="" can find it.
            window.navImpersonate = async function(event) {
                event.preventDefault();
                var input = document.getElementById('navImpersonateEmail');
                var status = document.getElementById('navImpersonateStatus');
                var submitBtn = event.target.querySelector('button[type="submit"]');
                var target = (input.value || '').trim().toLowerCase();
                if (!target) return false;
                if (status) { status.textContent = ''; status.className = 'nav-admin-status'; }
                if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Working…'; }

                try {
                    if (typeof firebase === 'undefined' || !firebase.auth) throw new Error('Firebase not loaded');
                    var user = firebase.auth().currentUser;
                    if (!user) throw new Error('Not signed in');
                    var idToken = await user.getIdToken(true);
                    var hostURL = window.getHostUrl ? window.getHostUrl() : 'https://us-central1-eagleeyessearch.cloudfunctions.net';
                    var r = await fetch(hostURL + '/admin_impersonate_user', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + idToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: target })
                    });
                    var bodyText = await r.text();
                    var data = {};
                    try { data = JSON.parse(bodyText); } catch (e) { data = { message: bodyText }; }
                    if (!r.ok) {
                        var msg = (data && data.message) ? data.message
                            : (r.status === 403 ? 'Not authorized to impersonate'
                            :  r.status === 404 ? 'No user with that email'
                            :  'Request failed (' + r.status + ')');
                        throw new Error(msg);
                    }
                    if (!data.token) throw new Error('No token in response');

                    await firebase.auth().signInWithCustomToken(data.token);
                    if (status) {
                        status.textContent = 'Signed in as ' + target + ' — reloading…';
                        status.className = 'nav-admin-status success';
                    }
                    setTimeout(function() {
                        // Drop any /account/ hash so we land cleanly on the new identity's view.
                        window.location.href = '{{ "/account/" | relative_url }}';
                    }, 350);
                } catch (err) {
                    console.error('Impersonate failed:', err);
                    if (status) {
                        status.textContent = err.message || 'Failed to log in as that user';
                        status.className = 'nav-admin-status error';
                    }
                    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Log in as'; }
                }
                return false;
            };

            function closeProfileDropdown() {
                var dd = document.getElementById('navProfileDropdown');
                var trigger = document.getElementById('navProfileTrigger');
                if (dd) dd.classList.remove('open');
                if (trigger) trigger.setAttribute('aria-expanded', 'false');
            }

            function init() {
                var trigger = document.getElementById('navProfileTrigger');
                var dd = document.getElementById('navProfileDropdown');
                var signOutBtn = document.getElementById('navSignOutBtn');

                if (trigger && dd) {
                    trigger.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var isOpen = dd.classList.toggle('open');
                        trigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                    });
                    document.addEventListener('click', function(e) {
                        if (!dd.contains(e.target) && !trigger.contains(e.target)) {
                            closeProfileDropdown();
                        }
                    });
                    document.addEventListener('keydown', function(e) {
                        if (e.key === 'Escape') closeProfileDropdown();
                    });
                }

                if (signOutBtn) {
                    signOutBtn.addEventListener('click', function() {
                        if (typeof firebase === 'undefined' || !firebase.auth) return;
                        firebase.auth().signOut().then(function() {
                            window.location.reload();
                        }).catch(function(err) {
                            console.error('Sign out error:', err);
                        });
                    });
                }

                // React to subsequent auth changes
                document.addEventListener('authStateChanged', function(e) {
                    applyAuthState(e.detail && e.detail.user);
                });

                // Apply current state if Firebase is already initialized
                if (typeof firebase !== 'undefined' && firebase.auth) {
                    try { applyAuthState(firebase.auth().currentUser); } catch (e) { /* ignore */ }
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
